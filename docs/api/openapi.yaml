openapi: 3.0.3
info:
  title: Review Workflow API
  version: 1.0.0
  description: >
    FastAPI contract for the review workflow application running on EKS.
    User identity is passed via the X-User-Id header, an interim stub for
    Cognito JWT verification (see docs/architecture/frontend-auth.md).

servers:
  - url: http://localhost:8080
    description: Local (docker compose)

tags:
  - name: Health
  - name: Reviews

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check used by the container HEALTHCHECK and Kubernetes probes
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok

  /reviews:
    get:
      tags:
        - Reviews
      summary: List review requests
      operationId: listReviews
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - in: query
          name: cursor
          required: false
          schema:
            type: string
          description: Opaque pagination cursor returned by a previous call.
      responses:
        '200':
          description: List of review requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReviewsResponse'

    post:
      tags:
        - Reviews
      summary: Create a review request
      operationId: createReview
      parameters:
        - in: header
          name: X-User-Id
          required: false
          schema:
            type: string
          description: Interim identity stub; recorded as the item's createdBy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewInput'
      responses:
        '201':
          description: Review request created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '422':
          description: Validation failed

  /reviews/{requestId}:
    get:
      tags:
        - Reviews
      summary: Get a review request by ID
      operationId: getReview
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Review request details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '404':
          description: Review request not found

  /reviews/{requestId}/status:
    patch:
      tags:
        - Reviews
      summary: Update a review request's status and reviewer note
      operationId: updateReviewStatus
      parameters:
        - in: path
          name: requestId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusInput'
      responses:
        '200':
          description: Review request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation failed (unknown status)
        '404':
          description: Review request not found

components:
  schemas:
    ReviewItem:
      type: object
      required:
        - requestId
        - title
        - requestType
        - status
        - createdBy
        - createdAt
        - updatedAt
      properties:
        requestId:
          type: string
          example: req-001
        title:
          type: string
          example: Review API terminology
        requestType:
          type: string
          example: term
        sourceLanguage:
          type: string
          example: en
        targetLanguage:
          type: string
          example: ja
        sourceText:
          type: string
          example: authorizer
        targetText:
          type: string
          example: authorizer
        category:
          type: string
          example: security
        status:
          type: string
          enum:
            - OPEN
            - IN_REVIEW
            - APPROVED
            - REJECTED
        reviewerNote:
          type: string
          nullable: true
          example: Keep the term consistent across the UI and documentation.
        createdBy:
          type: string
          example: kaori@example.com
        createdAt:
          type: string
          format: date-time
          example: 2026-06-01T09:00:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-06-01T10:00:00Z

    CreateReviewInput:
      type: object
      required:
        - title
        - requestType
        - sourceLanguage
        - targetLanguage
        - sourceText
      properties:
        title:
          type: string
          example: Review API Gateway terminology
        requestType:
          type: string
          example: term
        sourceLanguage:
          type: string
          example: en
        targetLanguage:
          type: string
          example: ja
        sourceText:
          type: string
          example: authorizer
        targetText:
          type: string
          example: authorizer
        category:
          type: string
          example: security
        reviewerNote:
          type: string
          example: Approved after terminology review.

    UpdateStatusInput:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - OPEN
            - IN_REVIEW
            - APPROVED
            - REJECTED
        reviewerNote:
          type: string
          example: Approved after terminology review.

    ReviewResponse:
      type: object
      required:
        - item
      properties:
        message:
          type: string
        item:
          $ref: '#/components/schemas/ReviewItem'

    ListReviewsResponse:
      type: object
      required:
        - items
        - count
        - hasMore
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReviewItem'
        count:
          type: integer
          example: 20
        hasMore:
          type: boolean
        cursor:
          type: string
          nullable: true
          description: Opaque pagination cursor. Pass back as the `cursor` query parameter to fetch the next page.
