apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: review-api
    newName: 515241425905.dkr.ecr.ap-southeast-2.amazonaws.com/review-workflow-dev-review-api
    newTag: v1

patches:
  - target:
      kind: ServiceAccount
      name: review-api
    patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: review-api
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::515241425905:role/review-workflow-dev-review-api-irsa
