apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: review-api
    # Replace with the ECR repository URL from `terraform output` before applying.
    newName: 123456789012.dkr.ecr.ap-southeast-2.amazonaws.com/review-workflow-dev-review-api
    newTag: v1

patches:
  - target:
      kind: ServiceAccount
      name: review-api
    patch: |-
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: review-api
        annotations:
          # Replace with the IRSA role ARN from `terraform output` before applying.
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/review-workflow-dev-review-api-irsa
